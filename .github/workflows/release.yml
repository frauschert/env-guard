name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type or explicit version (e.g. patch / minor / major / 1.2.3)"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT so the version-bump commit triggers the docs workflow
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Lint & test
        run: npm run lint && npm test

      - name: Bump version
        run: npm version ${{ inputs.bump }} --no-git-tag-version

      - name: Read new version
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Commit & tag
        run: |
          git add package.json package-lock.json
          git commit -m "chore: release v${{ steps.version.outputs.value }}"
          git tag "v${{ steps.version.outputs.value }}"
          git push origin main --follow-tags

      - name: Build
        run: npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          generate_release_notes: true

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
